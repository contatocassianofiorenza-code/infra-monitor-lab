---
- name: Adicionar chave GPG oficial do Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  become: yes

- name: Adicionar repositorio oficial do Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: yes

- name: Instalar Docker e Docker Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  become: yes

- name: Garantir que o servico Docker esta ativo e iniciado
  service:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Adicionar usuario ubuntu ao grupo docker
  user:
    name: ubuntu
    groups: docker
    append: yes
  become: yes

- name: Criar diretorio para os arquivos de monitoramento
  file:
    path: /opt/monitoring
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  become: yes