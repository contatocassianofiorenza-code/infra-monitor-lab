name: CD - Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sincronizar codigo da aplicacao
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            ./app/ ubuntu@${{ secrets.EC2_HOST }}:/opt/monitoring/app/

      - name: Sincronizar configuracoes de monitoramento
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no" \
            ./monitoring/ ubuntu@${{ secrets.EC2_HOST }}:/opt/monitoring/monitoring/

      - name: Copiar docker-compose.yml
        run: |
          scp -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no \
            docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/opt/monitoring/

      - name: Subir containers atualizados
        run: |
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} \
            "cd /opt/monitoring && docker compose up -d --build"

      - name: Verificar saude da aplicacao
        run: |
          sleep 10
          curl -f http://${{ secrets.EC2_HOST }}:5000/health || exit 1
          echo "Deploy concluido com sucesso"