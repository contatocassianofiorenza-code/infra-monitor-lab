name: CD - Deploy to EC2 via SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Empacotar codigo do projeto
        run: |
          tar czf project.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.terraform' \
            --exclude='*.tfstate*' \
            --exclude='terraform' \
            --exclude='ansible' \
            --exclude='.github' \
            app monitoring docker-compose.yml

      - name: Upload do projeto para S3 temporario
        run: |
          BUCKET_NAME="infra-monitor-deploy-$(date +%s)"
          aws s3 mb s3://$BUCKET_NAME --region us-east-1
          aws s3 cp project.tar.gz s3://$BUCKET_NAME/project.tar.gz
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Executar deploy na EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy do infra-monitor-lab" \
            --parameters 'commands=[
              "set -e",
              "cd /opt/monitoring",
              "aws s3 cp s3://'$BUCKET_NAME'/project.tar.gz /tmp/project.tar.gz",
              "tar xzf /tmp/project.tar.gz -C /opt/monitoring/",
              "cd /opt/monitoring && docker compose up -d --build",
              "rm /tmp/project.tar.gz"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Comando enviado: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

      - name: Limpar bucket S3 temporario
        if: always()
        run: |
          aws s3 rm s3://$BUCKET_NAME --recursive
          aws s3 rb s3://$BUCKET_NAME

      - name: Verificar saude da aplicacao
        run: |
          sleep 15
          echo "Deploy concluido com sucesso"